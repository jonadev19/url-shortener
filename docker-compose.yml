services:
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - web

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: url_shortener_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      DOMAIN_NAME: ${DOMAIN_NAME}
      NODE_ENV: production
    labels:
      - traefik.enable=true
      - traefik.docker.network=url_shortener_web
      - traefik.http.routers.url-shortener-http.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.url-shortener-http.entrypoints=web
      - traefik.http.routers.url-shortener-http.middlewares=url-shortener-https-redirect
      - traefik.http.middlewares.url-shortener-https-redirect.redirectscheme.scheme=https
      - traefik.http.routers.url-shortener.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.url-shortener.entrypoints=websecure
      - traefik.http.routers.url-shortener.tls=true
      - traefik.http.routers.url-shortener.tls.certresolver=letsencrypt
      - traefik.http.services.url-shortener.loadbalancer.server.port=3000
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - web
      - internal

  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  postgres_data:
  traefik_letsencrypt:

networks:
  web:
    name: url_shortener_web
  internal:
    name: url_shortener_internal
